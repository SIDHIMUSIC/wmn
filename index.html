<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bear ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --glow-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: #050505;
            color: white;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Breathing Background Effect */
        .breathing-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.15) 0%, rgba(0, 0, 0, 1) 70%);
            animation: breathe 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Neon Glass Card */
        .neon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-pink);
            border-radius: 25px;
            padding: 40px 25px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--glow-shadow);
            backdrop-filter: blur(15px);
            animation: cardEntrance 1.5s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
        }

        .gf-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-blue);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        #message {
            font-size: 1.5rem;
            line-height: 1.4;
            margin: 20px 0;
            min-height: 180px;
            color: #ffe0ed;
        }

        .signature {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0;
            transition: 2s;
            color: var(--neon-blue);
        }

        /* Button Styling */
        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: 0.3s;
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* Floating Neon Hearts */
        .neon-heart {
            position: absolute;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            pointer-events: none;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="breathing-bg"></div>

    <div class="neon-card" id="mainCard">
        <span class="gf-name">Bear</span>
        <h1>Happy Women's Day ❤️</h1>
        <div id="message">Pata hai jangali bear, tumhara liye itni special chij hai? Ek click karke dekho...</div>
        <button class="btn-neon" id="revealBtn" onclick="startSurprise()">Click Here</button>
        <div class="signature" id="sig">- Your boy, Harry 💎</div>
    </div>

    <script>
        const finalMessage = "You are the most beautiful and strongest women I know. \n\nMain tumhare saath hoon hamesha... I support you and love you in every situation. \n\nKeep shining, my bear! 💖";

        function startSurprise() {
            const msgDiv = document.getElementById('message');
            const btn = document.getElementById('revealBtn');
            const sig = document.getElementById('sig');

            btn.style.display = 'none';
            msgDiv.innerHTML = "";
            
            // Typewriter effect
            let i = 0;
            function type() {
                if (i < finalMessage.length) {
                    msgDiv.innerHTML += finalMessage.charAt(i) === '\n' ? '<br>' : finalMessage.charAt(i);
                    i++;
                    setTimeout(type, 50);
                } else {
                    sig.style.opacity = '1';
                }
            }
            type();
            
            // Start Hearts
            setInterval(createHeart, 400);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('neon-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    </script>
</body>
</html>
